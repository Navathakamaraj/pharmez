<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pharma Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f0f2f5; }
        .sidebar { width: 240px; background: #1a252f; color: white; height: 100vh; padding: 20px; position: fixed; }
        .sidebar h2 { color: #1abc9c; margin-bottom: 30px; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px; border-radius: 5px; margin: 5px 0; }
        .sidebar a:hover { background: #34495e; }
        .content { margin-left: 260px; padding: 30px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; color: #7f8c8d; font-size: 14px; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #444; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Pharma Admin</h2>
        <a href="/">Dashboard</a>
        <a href="/categories/list">Manage Categories</a>
        <a href="/products/list">Manage Products</a>
        <a href="/products/form">+ Add New Product</a>
    </div>

    <div class="content">
        <h1>Overview</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Categories</h3>
                <p th:text="${totalCategories}">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Products</h3>
                <p th:text="${totalProducts}">0</p>
            </div>
        </div>

        <div class="stat-card">
            <h3>Recent Products</h3>
            <table style="margin-top: 20px;">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Created Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.product_name}"></td>
                        <td th:text="${p.category.category_name}"></td>
                        <td th:text="${#temporals.format(p.create_date, 'dd-MMM-yyyy')}"></td>
                        <td><span class="status-badge" th:text="${p.product_status}"></span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
