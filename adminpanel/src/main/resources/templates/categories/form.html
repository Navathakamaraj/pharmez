<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Category Management</title>
    <style>
        /* Modern UI Styling */
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; text-align: center; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        
        input[type="text"], select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        
        textarea { height: 100px; resize: vertical; }
        
        .btn-save { 
            background: #3b82f6; color: white; border: none; padding: 14px; width: 100%; 
            cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; transition: background 0.3s;
        }
        .btn-save:hover { background: #2563eb; }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #1e293b; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <h2 th:text="${category.category_id != null} ? 'Edit Category' : 'Create New Category'"></h2>
        
        <form th:action="@{/categories/save}" th:object="${category}" method="post">
            
            <input type="hidden" th:field="*{category_id}" />

            <div class="form-group">
                <label>Category Name</label>
                <input type="text" th:field="*{category_name}" placeholder="e.g. Tablets, Syrups, Injections" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{category_description}" placeholder="Brief description of this category..."></textarea>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select th:field="*{category_status}">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <button type="submit" class="btn-save">Save Category</button>
        </form>
        
        <a href="/categories/list" class="back-link">← Cancel and Go Back</a>
    </div>

</body>
</html>
