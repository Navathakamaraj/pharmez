<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Form</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        label { font-weight: bold; color: #334155; display: block; margin-top: 10px; }
        button { background: #2c3e50; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 th:text="${product.product_id != null} ? 'Edit Product' : 'Create Product'"></h2>
        
        <form th:action="@{/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
            
            <input type="hidden" th:field="*{product_id}" />

            <label>Category (Only Active)</label>
            <select th:field="*{category}" required>
                <option value="">-- Select Category --</option>
                <option th:each="cat : ${categories}" th:value="${cat.category_id}" th:text="${cat.category_name}"></option>
            </select>

            <label>Product Name</label>
            <input type="text" th:field="*{product_name}" required>

            <label>Product Description</label>
            <textarea th:field="*{product_description}" placeholder="Enter details..."></textarea>

            <label>Product Image (Select from your PC)</label>
            <input type="file" name="imageFile" accept="image/*">
            
            <img th:if="*{product_image != null}" th:src="'data:image/jpeg;base64,' + *{product_image}" class="preview-img" />

            <label>Status</label>
            <select th:field="*{product_status}">
                <option value="In Stock">In Stock</option>
                <option value="Out of Stock">Out of Stock</option>
            </select>

            <button type="submit">Save Product</button>
            <a href="/products/list" style="display:block; text-align:center; margin-top:10px; color:#64748b; text-decoration:none;">Cancel</a>
        </form>
    </div>
</body>
</html>
