<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        
        /* Image Thumbnail Styling */
        .product-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; }
        .no-image { font-size: 11px; color: #94a3b8; font-style: italic; }

        .btn-add { background: #10b981; color: white; padding: 8px 16px; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .action-links a { text-decoration: none; font-weight: bold; margin-right: 15px; font-size: 14px; }
        .edit { color: #3b82f6; }
        .delete { color: #ef4444; }
        
        /* Description truncation for a neat table */
        .desc-text { 
            font-size: 13px; 
            color: #64748b; 
            max-width: 250px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Products</h1>
            <a href="/products/form" class="btn-add">+ New Product</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product Name</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Modified Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td>
                        <img th:if="${p.product_image != null and p.product_image != ''}" 
                             th:src="'data:image/jpeg;base64,' + ${p.product_image}" 
                             class="product-thumb" />
                        <span th:unless="${p.product_image != null and p.product_image != ''}" class="no-image">No Image</span>
                    </td>
                    
                    <td th:text="${p.product_name}" style="font-weight: 600; color: #1e293b;"></td>
                    
                    <td>
                        <div class="desc-text" th:text="${p.product_description}" th:title="${p.product_description}"></div>
                    </td>
                    
                    <td th:text="${p.category != null ? p.category.category_name : 'No Category'}"></td>
                    
                    <td th:text="${p.modify_date != null ? #temporals.format(p.modify_date, 'dd-MMM-yyyy HH:mm') : 'New'}"></td>
                    
                    <td class="action-links">
                        <a th:href="@{/products/edit/{id}(id=${p.product_id})}" class="edit">Edit</a>
                        
                        <a th:href="@{/products/delete/{id}(id=${p.product_id})}" 
                           class="delete" 
                           onclick="return confirm('Remove this product permanently from database?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <p><a href="/" style="text-decoration:none; color:#64748b; margin-top:20px; display:inline-block;">← Dashboard</a></p>
    </div>
</body>
</html>
